name: Daily DingTalk Push

on:
  schedule:
    # 仅周末推送：周六和周日 北京时间 07:30 (UTC 23:30)
    - cron: '30 23 * * 0,6'
  workflow_dispatch:  # 支持手动触发

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily push
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python push.py
